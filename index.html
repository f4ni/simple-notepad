<!DOCTYPE html>
<html>
  <head>
    <title>Simple Notepad</title>
    <style>
      :root {
        --page-bg: #f3f0e8;
        --panel-bg: rgba(255, 255, 255, 0.88);
        --editor-bg: #fffdf8;
        --editor-text: #1f1a14;
        --toolbar-text: #1f1a14;
        --border-color: rgba(31, 26, 20, 0.12);
        --control-bg: rgba(255, 255, 255, 0.92);
        --control-text: #1f1a14;
        --control-active-bg: #1f1a14;
        --control-active-text: #ffffff;
        --sidebar-bg: rgba(255, 255, 255, 0.72);
        --sidebar-text: #1f1a14;
        --sidebar-active-bg: rgba(31, 26, 20, 0.12);
        --page-accent: rgba(212, 170, 98, 0.18);
        --page-gradient-end: #ece7dc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, var(--page-accent), transparent 28%),
          linear-gradient(135deg, var(--page-bg), var(--page-gradient-end));
        color: var(--editor-text);
      }

      .app-shell {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        background: var(--sidebar-bg);
        backdrop-filter: blur(14px);
        border-right: 1px solid var(--border-color);
      }

      .sidebar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .sidebar-title {
        margin: 0;
        font-size: 20px;
        color: var(--sidebar-text);
      }

      .new-note-button,
      .toolbar select,
      .toolbar input[type="color"],
      .toolbar button {
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background: var(--control-bg);
        color: var(--control-text);
        font-size: 14px;
      }

      .new-note-button {
        padding: 10px 12px;
        cursor: pointer;
      }

      .note-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
      }

      .note-item {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 12px;
        text-align: left;
        background: transparent;
        color: var(--sidebar-text);
        cursor: pointer;
      }

      .note-item.active {
        background: var(--sidebar-active-bg);
        border-color: var(--border-color);
      }

      .note-item-title {
        display: block;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .note-item-meta {
        display: block;
        font-size: 12px;
        opacity: 0.7;
      }

      .main-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: var(--panel-bg);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
      }

      .note-heading {
        margin-right: auto;
        min-width: 180px;
      }

      .note-heading h2 {
        margin: 0;
        font-size: 20px;
        color: var(--toolbar-text);
      }

      .note-heading p {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--toolbar-text);
        opacity: 0.75;
      }

      .toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--toolbar-text);
      }

      .toolbar select {
        appearance: none;
        min-width: 120px;
        padding: 9px 10px;
      }

      .toolbar button {
        min-width: 44px;
        padding: 9px 12px;
        cursor: pointer;
      }

      .toolbar button.active {
        background: var(--control-active-bg);
        color: var(--control-active-text);
      }

      .toolbar input[type="color"] {
        width: 52px;
        height: 40px;
        padding: 4px;
      }

      textarea {
        width: 100%;
        flex: 1;
        min-height: 0;
        border: 0;
        resize: none;
        padding: 20px;
        font-size: 18px;
        line-height: 1.5;
        color: var(--editor-text);
        background: var(--editor-bg);
        outline: none;
      }

      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        padding: 24px;
        color: var(--toolbar-text);
      }

      @media (max-width: 900px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--border-color);
        }
      }
    </style>
  </head>

  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <h1 class="sidebar-title">Notes</h1>
          <button id="newNoteButton" class="new-note-button" type="button">New</button>
        </div>
        <div id="noteList" class="note-list"></div>
      </aside>

      <main class="main-panel">
        <div class="toolbar">
          <div class="note-heading">
            <h2 id="activeNoteTitle">Loading...</h2>
            <p id="activeNoteMeta">Choose a note to start editing.</p>
          </div>
          <label>
            Theme
            <select id="themeSelect">
              <option value="sand">Sand</option>
              <option value="mist">Mist</option>
              <option value="forest">Forest</option>
              <option value="midnight">Midnight</option>
            </select>
          </label>
          <label>
            Background
            <input id="backgroundPicker" type="color" value="#fffdf8" />
          </label>
          <button id="boldToggle" type="button">B</button>
          <button id="underlineToggle" type="button">U</button>
        </div>
        <textarea id="editor" placeholder="Start typing..."></textarea>
        <div id="emptyState" class="empty-state" hidden>Create a note from the sidebar to get started.</div>
      </main>
    </div>

    <script>
    const STORAGE_KEY = "simple-notepad-preferences";
    const editor = document.getElementById("editor");
    const noteList = document.getElementById("noteList");
    const newNoteButton = document.getElementById("newNoteButton");
    const activeNoteTitle = document.getElementById("activeNoteTitle");
    const activeNoteMeta = document.getElementById("activeNoteMeta");
    const emptyState = document.getElementById("emptyState");
    const themeSelect = document.getElementById("themeSelect");
    const backgroundPicker = document.getElementById("backgroundPicker");
    const boldToggle = document.getElementById("boldToggle");
    const underlineToggle = document.getElementById("underlineToggle");
    const clientId = crypto.randomUUID();

    let ws;
    let passcode = "";
    let isAuthenticated = false;
    let reconnectTimeoutId = null;
    let sendTimeoutId = null;
    let syncIntervalId = null;
    let pendingText = "";
    let notes = [];
    let activeNoteId = null;
    let activeNoteVersion = 0;

    let preferences = {
      theme: "sand",
      background: "#fffdf8",
      bold: false,
      underline: false,
    };

    editor.disabled = true;

    function savePreferences() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(preferences));
    }

    function getReadableTextColor(backgroundColor) {
      const hex = backgroundColor.replace("#", "");

      if (hex.length !== 6) {
        return "#1f1a14";
      }

      const red = parseInt(hex.slice(0, 2), 16);
      const green = parseInt(hex.slice(2, 4), 16);
      const blue = parseInt(hex.slice(4, 6), 16);
      const brightness = (red * 299 + green * 587 + blue * 114) / 1000;

      return brightness > 150 ? "#1b1b1b" : "#f7f7f7";
    }

    function applyPreferences() {
      const themes = {
        sand: {
          pageBg: "#f3f0e8",
          panelBg: "rgba(255, 255, 255, 0.88)",
          sidebarBg: "rgba(255, 252, 244, 0.72)",
          editorBg: preferences.background,
          toolbarText: "#1f1a14",
          sidebarText: "#1f1a14",
          sidebarActiveBg: "rgba(123, 94, 46, 0.12)",
          borderColor: "rgba(31, 26, 20, 0.12)",
          controlBg: "rgba(255, 255, 255, 0.92)",
          controlText: "#1f1a14",
          controlActiveBg: "#1f1a14",
          controlActiveText: "#ffffff",
          pageAccent: "rgba(212, 170, 98, 0.18)",
          pageGradientEnd: "#ece7dc",
        },
        mist: {
          pageBg: "#dce8f2",
          panelBg: "rgba(240, 247, 252, 0.9)",
          sidebarBg: "rgba(228, 239, 248, 0.82)",
          editorBg: preferences.background,
          toolbarText: "#1d3142",
          sidebarText: "#1d3142",
          sidebarActiveBg: "rgba(50, 92, 122, 0.16)",
          borderColor: "rgba(29, 49, 66, 0.16)",
          controlBg: "#e2edf6",
          controlText: "#1d3142",
          controlActiveBg: "#325c7a",
          controlActiveText: "#ffffff",
          pageAccent: "rgba(132, 176, 214, 0.28)",
          pageGradientEnd: "#f4f8fb",
        },
        forest: {
          pageBg: "#d9e6d5",
          panelBg: "rgba(241, 247, 238, 0.9)",
          sidebarBg: "rgba(224, 236, 221, 0.82)",
          editorBg: preferences.background,
          toolbarText: "#203827",
          sidebarText: "#203827",
          sidebarActiveBg: "rgba(53, 88, 68, 0.16)",
          borderColor: "rgba(32, 56, 39, 0.16)",
          controlBg: "#e3efe1",
          controlText: "#203827",
          controlActiveBg: "#355844",
          controlActiveText: "#ffffff",
          pageAccent: "rgba(107, 158, 118, 0.24)",
          pageGradientEnd: "#edf5ea",
        },
        midnight: {
          pageBg: "#1a1f2b",
          panelBg: "rgba(34, 40, 56, 0.88)",
          sidebarBg: "rgba(24, 29, 41, 0.86)",
          editorBg: preferences.background,
          toolbarText: "#f3f5fa",
          sidebarText: "#f3f5fa",
          sidebarActiveBg: "rgba(243, 245, 250, 0.14)",
          borderColor: "rgba(243, 245, 250, 0.16)",
          controlBg: "#363f57",
          controlText: "#f3f5fa",
          controlActiveBg: "#f3f5fa",
          controlActiveText: "#1a1f2b",
          pageAccent: "rgba(111, 132, 202, 0.24)",
          pageGradientEnd: "#111522",
        },
      };

      const selectedTheme = themes[preferences.theme] || themes.sand;

      document.documentElement.style.setProperty("--page-bg", selectedTheme.pageBg);
      document.documentElement.style.setProperty("--panel-bg", selectedTheme.panelBg);
      document.documentElement.style.setProperty("--sidebar-bg", selectedTheme.sidebarBg);
      document.documentElement.style.setProperty("--editor-bg", selectedTheme.editorBg);
      document.documentElement.style.setProperty("--editor-text", getReadableTextColor(preferences.background));
      document.documentElement.style.setProperty("--toolbar-text", selectedTheme.toolbarText);
      document.documentElement.style.setProperty("--sidebar-text", selectedTheme.sidebarText);
      document.documentElement.style.setProperty("--sidebar-active-bg", selectedTheme.sidebarActiveBg);
      document.documentElement.style.setProperty("--border-color", selectedTheme.borderColor);
      document.documentElement.style.setProperty("--control-bg", selectedTheme.controlBg);
      document.documentElement.style.setProperty("--control-text", selectedTheme.controlText);
      document.documentElement.style.setProperty("--control-active-bg", selectedTheme.controlActiveBg);
      document.documentElement.style.setProperty("--control-active-text", selectedTheme.controlActiveText);
      document.documentElement.style.setProperty("--page-accent", selectedTheme.pageAccent);
      document.documentElement.style.setProperty("--page-gradient-end", selectedTheme.pageGradientEnd);

      editor.style.fontWeight = preferences.bold ? "700" : "400";
      editor.style.textDecoration = preferences.underline ? "underline" : "none";

      themeSelect.value = preferences.theme;
      backgroundPicker.value = preferences.background;
      boldToggle.classList.toggle("active", preferences.bold);
      underlineToggle.classList.toggle("active", preferences.underline);
    }

    function loadPreferences() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (saved) {
        try {
          preferences = {
            ...preferences,
            ...JSON.parse(saved),
          };
        } catch (_error) {
        }
      }

      applyPreferences();
    }

    function formatUpdatedAt(updatedAt) {
      if (!updatedAt) {
        return "Just now";
      }

      return new Date(updatedAt).toLocaleString();
    }

    function renderNotes() {
      noteList.innerHTML = "";

      notes.forEach((note) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "note-item";

        if (note.id === activeNoteId) {
          button.classList.add("active");
        }

        button.innerHTML = `
          <span class="note-item-title">${note.title}</span>
          <span class="note-item-meta">${formatUpdatedAt(note.updatedAt)}</span>
        `;

        button.addEventListener("click", () => {
          openNote(note.id);
        });

        noteList.appendChild(button);
      });
    }

    function setEmptyState(isEmpty) {
      emptyState.hidden = !isEmpty;
      editor.hidden = isEmpty;
      editor.disabled = isEmpty || !isAuthenticated || !activeNoteId;
    }

    function setActiveNote(note) {
      if (!note) {
        activeNoteId = null;
        activeNoteVersion = 0;
        activeNoteTitle.textContent = "No note selected";
        activeNoteMeta.textContent = "Create a note from the sidebar.";
        editor.value = "";
        setEmptyState(true);
        renderNotes();
        return;
      }

      activeNoteId = note.id;
      activeNoteVersion = note.version || 0;
      activeNoteTitle.textContent = note.title;
      activeNoteMeta.textContent = `Last updated ${formatUpdatedAt(note.updatedAt)}`;
      editor.value = note.text || "";
      setEmptyState(false);
      editor.disabled = !isAuthenticated;
      renderNotes();
    }

    function upsertNoteSummary(note) {
      const existingIndex = notes.findIndex((entry) => entry.id === note.id);

      if (existingIndex >= 0) {
        notes[existingIndex] = { ...notes[existingIndex], ...note };
      } else {
        notes.push(note);
      }

      notes.sort((left, right) => {
        return new Date(right.updatedAt).getTime() - new Date(left.updatedAt).getTime();
      });
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "x-notepad-passcode": passcode,
          ...(options.headers || {}),
        },
      });

      if (!response.ok) {
        throw new Error(`Request failed with status ${response.status}`);
      }

      return response.json();
    }

    async function openNote(noteId) {
      if (!passcode) {
        return;
      }

      const data = await fetchJson(`/api/notes/${noteId}`);
      setActiveNote(data.note);
    }

    async function refreshNotesList() {
      if (!passcode) {
        return;
      }

      const data = await fetchJson("/api/notes");
      notes = data.notes || [];
      renderNotes();
    }

    async function syncActiveNote() {
      if (!passcode || !activeNoteId) {
        return;
      }

      const data = await fetchJson(`/api/notes/${activeNoteId}`);

      if ((data.note.version || 0) > activeNoteVersion) {
        setActiveNote(data.note);
      }
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimeoutId);
      reconnectTimeoutId = setTimeout(connect, 1000);
    }

    function flushPendingText() {
      if (!isAuthenticated || !activeNoteId || !ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }

      ws.send(
        JSON.stringify({
          type: "update-note",
          noteId: activeNoteId,
          text: pendingText,
        })
      );
    }

    function queueSend() {
      pendingText = editor.value;
      clearTimeout(sendTimeoutId);
      sendTimeoutId = setTimeout(flushPendingText, 60);
    }

    function connect() {
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        if (!passcode) {
          passcode = prompt("Enter passcode:");

          if (!passcode) {
            alert("A passcode is required.");
            ws.close();
            return;
          }
        }

        ws.send(JSON.stringify({ type: "auth", pass: passcode, clientId }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "init") {
          isAuthenticated = true;
          editor.disabled = false;
          notes = data.notes || [];
          renderNotes();
          setActiveNote(data.activeNote);
          return;
        }

        if (data.type === "notes-list") {
          notes = data.notes || [];
          renderNotes();
          return;
        }

        if (data.type === "note-created") {
          upsertNoteSummary(data.note);
          renderNotes();
          return;
        }

        if (data.type === "note-update") {
          upsertNoteSummary({
            id: data.noteId,
            title: notes.find((note) => note.id === data.noteId)?.title || "Untitled Note",
            version: data.version,
            updatedAt: data.updatedAt,
          });

          if (data.noteId === activeNoteId) {
            if (data.sourceClientId === clientId) {
              activeNoteVersion = data.version || activeNoteVersion;
              activeNoteMeta.textContent = `Last updated ${formatUpdatedAt(data.updatedAt)}`;
              renderNotes();
              return;
            }

            if ((data.version || 0) > activeNoteVersion) {
              activeNoteVersion = data.version || 0;
              activeNoteMeta.textContent = `Last updated ${formatUpdatedAt(data.updatedAt)}`;
              editor.value = data.text || "";
            }
          }

          renderNotes();
          return;
        }

        if (data.type === "auth-error") {
          alert("Incorrect passcode.");
          passcode = "";
          ws.close();
        }
      };

      ws.onclose = () => {
        editor.disabled = true;
        isAuthenticated = false;
        scheduleReconnect();
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    editor.addEventListener("input", () => {
      if (!isAuthenticated || !activeNoteId) {
        return;
      }

      queueSend();
    });

    themeSelect.addEventListener("change", () => {
      preferences.theme = themeSelect.value;
      savePreferences();
      applyPreferences();
    });

    backgroundPicker.addEventListener("input", () => {
      preferences.background = backgroundPicker.value;
      savePreferences();
      applyPreferences();
    });

    boldToggle.addEventListener("click", () => {
      preferences.bold = !preferences.bold;
      savePreferences();
      applyPreferences();
    });

    underlineToggle.addEventListener("click", () => {
      preferences.underline = !preferences.underline;
      savePreferences();
      applyPreferences();
    });

    newNoteButton.addEventListener("click", async () => {
      if (!passcode) {
        return;
      }

      const title = prompt("Name your new note:");

      if (!title) {
        return;
      }

      try {
        const data = await fetchJson("/api/notes", {
          method: "POST",
          body: JSON.stringify({ title }),
        });

        upsertNoteSummary({
          id: data.note.id,
          title: data.note.title,
          version: data.note.version,
          updatedAt: data.note.updatedAt,
        });
        setActiveNote(data.note);
      } catch (_error) {
        alert("Could not create the note.");
      }
    });

    syncIntervalId = setInterval(() => {
      refreshNotesList().catch(() => {});
      syncActiveNote().catch(() => {});
    }, 5000);

    window.addEventListener("beforeunload", () => {
      clearInterval(syncIntervalId);
      clearTimeout(reconnectTimeoutId);
      clearTimeout(sendTimeoutId);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }
    });

    loadPreferences();
    setEmptyState(true);
    connect();
    </script>
  </body>
</html>
